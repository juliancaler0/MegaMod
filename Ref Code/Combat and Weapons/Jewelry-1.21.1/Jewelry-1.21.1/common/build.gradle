architectury {
    common rootProject.enabled_platforms.split(',')
}

// Dummy platform for common compile
def platform = "fabric";

repositories {
    maven { url 'https://maven.kosmx.dev/' }
    maven { url 'https://maven.shedaniel.me/' }
    maven { url 'https://maven.azuredoom.com/mods' }
    maven {
        name = "TerraformersMC"
        url = "https://maven.terraformersmc.com/"
    }
    maven {
        name = 'Modrinth'
        url = 'https://api.modrinth.com/maven'
        content {
            includeGroup 'maven.modrinth'
        }
    }
    maven {
        name = "Ladysnake Libs"
        url = 'https://maven.ladysnake.org/releases'
    }

    // For Accessories:
    maven { url 'https://maven.wispforest.io/releases' }
    maven { url 'https://maven.su5ed.dev/releases' }
    maven { url 'https://maven.fabricmc.net' }

    mavenLocal()
}

dependencies {
    // We depend on Fabric Loader here to use the Fabric @Environment annotations,
    // which get remapped to the correct annotations on each platform.
    // Do NOT use other classes from Fabric Loader.
    modImplementation "net.fabricmc:fabric-loader:$project.fabric_loader_version"
    modImplementation "net.fabricmc.fabric-api:fabric-api:$project.fabric_api_version"

    modImplementation("maven.modrinth:tiny-config:${project.tiny_config_version}-${platform}")

    modImplementation("maven.modrinth:structure-pool-api:${project.structure_pool_api_version}-${platform}")
//    modImplementation("net.foundation:structure_pool_api-${platform}:${project.structure_pool_api_version}")
    modImplementation("maven.modrinth:spell-power:${project.spell_power_version}-${platform}")
//    modImplementation("net.spell_power:spell_power-${platform}:${project.spell_power_version}")
    modImplementation("maven.modrinth:ranged-weapon-api:${project.ranged_weapon_api_version}-${platform}")
//    modImplementation("net.foundation:ranged_weapon_api-${platform}:${project.ranged_weapon_api_version}")

    // Compat only
    modCompileOnly("maven.modrinth:spell-engine:${project.spell_engine_version}-${platform}")
//    modCompileOnly("net.spell_engine:spell_engine-${platform}:${project.spell_engine_version}")

    // Compatibility
    // Fabric specific
    modCompileOnly "io.wispforest:owo-lib:${project.owo_version}" // Accessories needs this
    modImplementation("io.wispforest:accessories-common:${project.accessories_version}")
}
