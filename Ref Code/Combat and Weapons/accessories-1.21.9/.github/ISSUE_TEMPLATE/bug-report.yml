# Based on Aether Bug Report creted by bconlon: https://github.com/The-Aether-Team/The-Aether-II/blob/1.21.4-develop/.github/ISSUE_TEMPLATE/bug-report.yml
name: '🐛 Bug Report'
description: Create an issue about a bug.
type: Bug
title: 'Bug: [<Insert minecraft version>] <Here contains concise summary of the bug>'
body:
  - type: dropdown
    id: bug-type
    attributes:
      label: What Type of Bug Is This?
      options:
        - Annoyance
        - Compatibility
        - Crash
        - Design
        - Performance
        - Unexpected Behavior
      validations:
        required: true
  - type: input
    id: minecraft_ver
    attributes:
      label: Minecraft Version
      description: What minecraft version are you using? E.g. 1.20.1, 1.21.1
      placeholder: "1.21.1"
    validations:
      required: true
  - type: input
    id: modloader
    attributes:
      label: Mod Loader
      description: What mod loader are you using? E.g. Fabric or Neoforge
      placeholder: "Fabric"
    validations:
      required: true
  - type: input
    id: loader-ver
    attributes:
      label: Mod Loader API Version
      description: What version of the mod loader are you running? This can be found on the installation jar you have downloaded, in the Mod Options menu, or the profile's version. Please note "latest" is NOT a version.
      placeholder: "39.0.0"
    validations:
      required: true
  - type: input
    id: accessories-ver
    attributes:
      label: The Accessories Version
      description: What version of Accessories are you running? This can be found on the jar file you have downloaded or the Mod Options menu. Please note "latest" is NOT a version.
      placeholder: "1.1.1"
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Using any of Accessories Compatibility Layers?
      options:
        - label: Are you using one of the Compatibility Layers within your Pack for Accessories?
          required: true
  - type: input
    id: compat-ver
    attributes:
      label: The Compatibility Version
      description: What version of the Compat Layer are you running? Details on finding version info is above
      placeholder: "1.1.1"
    validations:
      required: false
  - type: input
    id: mod-conflict
    attributes:
      label: Is This Bug a Conflict With Another Mod?
      description: If this happens due to another mod, please put the name and version of the mod here. Leave blank otherwise.
    validations:
      required: false
  - type: input
    id: client-log
    attributes:
      label: Logs
      description: Either a **[Gist](https://gist.github.com/)** link or other link to the full game log. This can be found in the game files under the `logs` folder. Though not necessary, a client log can help diagnose an issue better in case a bug is caused by a reported error. Provide the `latest.log` or `debug.log` file as a Gist as soon as you find the bug, as these files are reset every time the game is opened.
    validations:
      required: false
  - type: input
    id: crash-log
    attributes:
      label: Crash Report (if applicable)
      description: A **[Gist](https://gist.github.com/)** link to the crash report. This can be found in the game files under the `crash-reports` folder, and all the contents of the file should be pasted into the Gist file. If the bug does not result in a crash, ignore this field.
  - type: textarea
    id: steps
    attributes:
      label: What Actually Happened, What You Expected To Happen, and any known steps to reproduce
      description: A detailed list of how you encountered this bug if it is not immediately obvious. If the bug is immediately obvious, briefly mention how to replicate it.
      placeholder: |
        Instead of this I encountered that which I thought would not happen.
        
        How often this happens
        1. Step 1
        2. Step 2
        3. Step 3, etc.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional Details
      description: Provide any other information you think might be useful for this report. This may include screenshots, video footage, other mod details, anything you think might be relevant.
  - type: checkboxes
    id: confirmation
    attributes:
      label: Please Read and Confirm The Following
      options:
        - label: I have confirmed this bug is on the most recently supported version of Minecraft.
          required: true
        - label: I have confirmed the details provided in this report are concise as possible and does not contain vague information (ie. Versions are properly recorded, answers to questions are clear).
          required: true
        - label: I have confirmed this bug is unique and has not been reported already.
          required: true
        - label: If playing on a modpack, I have reported this bug to their issue tracker already.
          required: true