plugins {
    id 'com.gradleup.shadow'
    id "com.matthewprenger.cursegradle" version "1.4.0"
    id "com.modrinth.minotaur" version "2.+"
}

def platform = project.name;

architectury {
    platformSetupLoomIde()
    neoForge()
}

loom {
    accessWidenerPath = project(":common").loom.accessWidenerPath
}

def generatedResources = project(':common').file('src/main/generated')
sourceSets {
    main {
        resources.srcDir generatedResources
    }
}

configurations {
    common {
        canBeResolved = true
        canBeConsumed = false
    }
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentNeoForge.extendsFrom common

    // Files in this configuration will be bundled into your mod using the Shadow plugin.
    // Don't use the `shadow` configuration from the plugin itself as it's meant for excluding files.
    shadowBundle {
        canBeResolved = true
        canBeConsumed = false
    }
}

repositories {
    maven {
        name = 'NeoForged'
        url = 'https://maven.neoforged.net/releases'
    }
    maven { url 'https://maven.kosmx.dev/' }
    maven { url 'https://maven.shedaniel.me/' }
    maven {
        name = 'Modrinth'
        url = 'https://api.modrinth.com/maven'
        content {
            includeGroup 'maven.modrinth'
        }
    }
    maven {
        name = "TerraformersMC"
        url = "https://maven.terraformersmc.com/"
    }
    maven {
        name = "Ladysnake Libs"
        url = 'https://maven.ladysnake.org/releases'
    }
    exclusiveContent {
        forRepository {
            maven {
                url = "https://maven.ftb.dev/releases"
            }
        }
        filter {
            includeGroup"dev.latvian.mods"
            includeGroup"dev.ftb.mods"
        }
    }
    // JEI Maven currently required by FTB
    maven {
        name "ModMaven (JEI)"
        url "https://modmaven.dev/"
        content {
            includeGroup "mezz.jei"
        }
    }
    maven {
        url "https://maven.su5ed.dev/releases"
    }

    // For Accessories
    maven { url 'https://maven.wispforest.io/releases' }
    maven { url 'https://maven.fabricmc.net' }

    // CurseMaven
    maven {
        url = "https://www.cursemaven.com"
        content {
            includeGroup "curse.maven"
        }
    }

    mavenLocal()
}

dependencies {
    neoForge "net.neoforged:neoforge:$rootProject.neoforge_version"
    common(project(path: ':common', configuration: 'namedElements')) { transitive = false }
    shadowBundle project(path: ':common', configuration: 'transformProductionNeoForge')
    modImplementation "org.sinytra.forgified-fabric-api:forgified-fabric-api:${project.forgified_fabric_api_version}"

    modImplementation("dev.kosmx.player-anim:player-animation-lib-forge:${project.player_anim_version}")
    modImplementation("me.shedaniel.cloth:cloth-config-${platform}:${project.cloth_config_version}")

    include(modImplementation("maven.modrinth:tiny-config:${project.tiny_config_version}-${platform}"))
//    modImplementation("net.tiny_config:tiny_config-${platform}:${project.tiny_config_version}")
    modImplementation("maven.modrinth:spell-power:${project.spell_power_version}-${platform}")
//    modImplementation("net.spell_power:spell_power-${platform}:${project.spell_power_version}")
    modImplementation("maven.modrinth:ranged-weapon-api:${project.ranged_weapon_api_version}-${platform}")
//    modImplementation("net.foundation:ranged_weapon_api-${platform}:${project.ranged_weapon_api_version}")
    modCompileOnly("maven.modrinth:bundle-api:${project.bundle_api_version}-${platform}")
//    modCompileOnly("com.github.TheRedBrain:bundle-api-${platform}:${project.bundle_api_version}")
    modCompileOnly("maven.modrinth:critical-strike:${project.critical_strike_version}-${platform}")

    // Compatibility

    modCompileOnly("maven.modrinth:shoulder-surfing-reloaded:${project.shoulder_surfing_version}+${platform}")
    modCompileOnly("maven.modrinth:better-combat:${project.better_combat_version}-${platform}")
    modCompileOnly("maven.modrinth:combat-roll:${project.combat_roll_version}-${platform}")
    modCompileOnly("dev.ftb.mods:ftb-teams-${platform}:${project.ftb_teams_version}")
    modCompileOnly("dev.ftb.mods:ftb-library-${platform}:${project.ftb_library_version}")
    modCompileOnly("maven.modrinth:iris:${project.iris_version}")

    // NeoForge specific
    // - Accessories - https://docs.wispforest.io/accessories/developer/dev_setup
    modImplementation "maven.modrinth:owo-lib:${project.owo_neo_version}" // AccessoryItem wouldn't compile without this
    modImplementation("io.wispforest:accessories-neoforge:${project.accessories_version}")
    forgeRuntimeLibrary("blue.endless:jankson:1.2.2")
    forgeRuntimeLibrary("io.wispforest:endec:0.1.5.1")
    forgeRuntimeLibrary("io.wispforest.endec:gson:0.1.3.1")
    forgeRuntimeLibrary("io.wispforest.endec:jankson:0.1.3.1")
    forgeRuntimeLibrary("io.wispforest.endec:netty:0.1.2")
}

processResources {
    inputs.property 'version', project.version

    filesMatching('META-INF/neoforge.mods.toml') {
        def cleanedProps = project.properties.collectEntries { k, v ->
            def s = v?.toString()
            [(k.toString()): (s?.contains('+') ? s.substring(0, s.indexOf('+')) : s)]
        }
        expand(cleanedProps)
    }
}

shadowJar {
    configurations = [project.configurations.shadowBundle]
    archiveClassifier = 'dev-shadow'
}

remapJar {
    inputFile.set shadowJar.archiveFile
    atAccessWideners.add("spell_engine.accesswidener")
}

if(project.hasProperty('release_type')) {
    tasks.register("publishMod") {
        dependsOn(build)
        finalizedBy(tasks.curseforge)
        finalizedBy(tasks.modrinth)
    }

    curseforge {
        apiKey = System.getenv("CURSEFORGE_API_KEY")
        project {
            id = System.getenv("CURSEFORGE_PROJECT_ID")
            changelog = changelog_last_section()
            changelogType = 'markdown'
            releaseType = release_type
            addGameVersion "${project.minecraft_version}"
            addGameVersion "${project.minecraft_compat_version}"
            addGameVersion "NeoForge"

            relations {
                requiredDependency 'forgified-fabric-api'
                requiredDependency 'cloth-config'
                requiredDependency 'playeranimator'
                requiredDependency 'spell-power'
                requiredDependency 'accessories'
            }

            mainArtifact(remapJar)
            afterEvaluate {
                uploadTask.dependsOn(remapJar)
            }
            options {
                forgeGradleIntegration = false
            }
        }
    }

    modrinth {
        token = System.getenv("MODRINTH_API_KEY")
        projectId = System.getenv("MODRINTH_PROJECT_ID") // This can be the project ID or the slug. Either will work!
        changelog = changelog_last_section()
        versionName = "${version}" // You don't need to set this manually. Will fail if Modrinth has this version already
        versionNumber = "${version}-${platform}" // You don't need to set this manually. Will fail if Modrinth has this version already
        versionType = release_type // This is the default -- can also be `beta` or `alpha`
        uploadFile = remapJar // With Loom, this MUST be set to `remapJar` instead of `jar`!
        gameVersions = ["${project.minecraft_version}", "${project.minecraft_compat_version}"] // Must be an array, even with only one version
        loaders = ["neoforge"] // Must also be an array - no need to specify this if you're using Loom or ForgeGradle
        changelog = changelog_last_section()
        dependencies { // A special DSL for creating dependencies
            required.project 'forgified-fabric-api'
            required.project 'cloth-config'
            required.project 'playeranimator'
            required.project 'spell-power'
            required.project 'accessories'
        }
    }
}
